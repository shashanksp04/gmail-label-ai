<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LabelPilot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 400px;
      max-height: 640px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: #1a73e8;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 8px 0;
      color: #5f6368;
    }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.authenticated {
      background: #e6f4ea;
      color: #137333;
    }
    .status.needs_auth {
      background: #fef7e0;
      color: #b06000;
    }
    .status.unknown {
      background: #f1f3f4;
      color: #5f6368;
    }
    .ai-status {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #1a73e8;
      color: white;
    }
    button:hover {
      background: #1557b0;
    }
    button:disabled {
      background: #dadce0;
      color: #80868b;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: #1a73e8;
      border: 1px solid #1a73e8;
      margin-top: 8px;
    }
    button.secondary:hover {
      background: #e8f0fe;
    }
    button.danger {
      border-color: #d93025;
      color: #d93025;
    }
    button.danger:hover {
      background: #fce8e6;
    }
    .mappings-list {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #dadce0;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .mapping-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
    }
    .mapping-item:last-child {
      border-bottom: none;
    }
    .mapping-item span {
      flex: 1;
      overflow-wrap: break-word;
      word-break: break-all;
    }
    .mapping-item .label-name {
      color: #1a73e8;
      margin-right: 8px;
    }
    .mapping-item button {
      width: auto;
      padding: 4px 8px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .empty-mappings {
      padding: 16px;
      text-align: center;
      color: #80868b;
      font-size: 13px;
    }
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <h1>LabelPilot</h1>
  <div id="status" class="status unknown">Checking status...</div>
  <div id="aiStatus" class="ai-status"></div>
  <button id="authBtn" style="display: none;">Sign in to Gmail</button>
  <button id="scanBtn" style="display: none;">Scan Now</button>

  <div id="mappingsSection" style="display: none;">
    <h2>Sender Mappings</h2>
    <div id="mappingsList" class="mappings-list"></div>
    <button id="clearMappingsBtn" class="secondary danger">Clear All Mappings</button>
  </div>

  <div class="footer">Automatically labels your Gmail</div>
  <script src="popup.js"></script>
</body>
</html>
